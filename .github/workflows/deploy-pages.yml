name: Build and deploy Pygbag game

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pygbag==0.9.3 fonttools

      - name: Prepare Chinese font subset
        run: python tools/prepare_web_fonts.py

      - name: Build web game
        run: python -m pygbag --build --ume_block 1 --title "核境造物" .

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
